services:
  postgres:
    image: postgres:18-alpine
    container_name: coraje_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Bogota

    ports:
      # Expuesto solo en localhost de la VPS.
      # Para DBeaver, conecta mediante túnel SSH al puerto 5433.
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"

    volumes:
      - coraje_postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    # Temporalmente podrías usar latest solo para detectar versión.
    # En Git debe quedar fijado, por ejemplo: n8nio/n8n:2.23.3
    image: n8nio/n8n:2.23.3
    container_name: coraje_n8n
    restart: unless-stopped

    ports:
      - "5679:5678"

    environment:
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota

      # Cambiar cuando tengas dominio/proxy.
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}

      # Recomendado por configuración Docker moderna de n8n.
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"

      # Clave crítica: si cambia, puedes perder acceso a credenciales cifradas.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

    volumes:
      - coraje_n8n_data:/home/node/.n8n

volumes:
  coraje_postgres_data:
  coraje_n8n_data:
