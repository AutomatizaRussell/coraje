services:
  postgres:
    image: postgres:18-alpine
    container_name: coraje_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Bogota

    ports:
      # Expuesto solo en localhost de la VPS.
      # Para DBeaver, conecta mediante túnel SSH al puerto 5433.
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"

    volumes:
      - coraje_postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:2.23.3
    container_name: coraje_n8n
    restart: unless-stopped

    ports:
      - "5679:5678"

    environment:
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota

      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}

      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"

      CORAJE_REMOTE_N8N_WEBHOOK_URL: ${CORAJE_REMOTE_N8N_WEBHOOK_URL}
      CORAJE_REMOTE_N8N_SECRET: ${CORAJE_REMOTE_N8N_SECRET}

    volumes:
      - coraje_n8n_data:/home/node/.n8n

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  coraje_postgres_data:
  coraje_n8n_data: